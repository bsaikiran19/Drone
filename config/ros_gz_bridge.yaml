# ros_gz_bridge topic mappings for the fixed X3 drone
# Use with parameter_bridge or a bridge config YAML.
#
# Gazebo topic               direction   ROS 2 topic / type
# ─────────────────────────────────────────────────────────────────────────────
# /x3/cmd_vel          GZ←ROS   /drone/cmd_vel   geometry_msgs/msg/Twist
# /x3/odometry         GZ→ROS   /drone/odom      nav_msgs/msg/Odometry
# /x3/camera/image_raw GZ→ROS   /drone/camera/image_raw  sensor_msgs/msg/Image
# /clock               GZ→ROS   /clock           rosgraph_msgs/msg/Clock
# /x3/enable           GZ←ROS   /drone/enable    std_msgs/msg/Bool
# ─────────────────────────────────────────────────────────────────────────────
#
# parameter_bridge argument list (one per line for readability):
#
#   /x3/cmd_vel@geometry_msgs/msg/Twist]gz.msgs.Twist
#   /x3/odometry@nav_msgs/msg/Odometry[gz.msgs.Odometry
#   /x3/camera/image_raw@sensor_msgs/msg/Image[gz.msgs.Image
#   /clock@rosgraph_msgs/msg/Clock[gz.msgs.Clock
#   /x3/enable@std_msgs/msg/Bool]gz.msgs.Boolean
#
# In your launch file, replace the old bridge arguments with the above.
# The key change: Gazebo namespace is now 'x3' (matching <robotNamespace>x3</robotNamespace>)
# instead of 'drone'.  ROS-side remappings keep your node topics unchanged.

- ros_topic_name: "/drone/cmd_vel"
  gz_topic_name:  "/x3/cmd_vel"
  ros_type_name:  "geometry_msgs/msg/Twist"
  gz_type_name:   "gz.msgs.Twist"
  direction:      ROS_TO_GZ

- ros_topic_name: "/drone/odom"
  gz_topic_name:  "/model/x3/odometry"
  ros_type_name:  "nav_msgs/msg/Odometry"
  gz_type_name:   "gz.msgs.Odometry"
  direction:      GZ_TO_ROS

- ros_topic_name: "/drone/front_camera/image_raw"
  gz_topic_name:  "/camera/front/image_raw"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction:      GZ_TO_ROS

- ros_topic_name: "/drone/down_camera/image_raw"
  gz_topic_name:  "/camera/down/image_raw"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction:      GZ_TO_ROS

- ros_topic_name: "/clock"
  gz_topic_name:  "/clock"
  ros_type_name:  "rosgraph_msgs/msg/Clock"
  gz_type_name:   "gz.msgs.Clock"
  direction:      GZ_TO_ROS

- ros_topic_name: "/drone/enable"
  gz_topic_name:  "/x3/enable"
  ros_type_name:  "std_msgs/msg/Bool"
  gz_type_name:   "gz.msgs.Boolean"
  direction:      ROS_TO_GZ
